<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Pill-Track (from #8) + refined spark lines -->
  <!-- Horizontal toggle, cleaner proportions -->
  
  <!-- Pill track -->
  <rect x="100" y="192" width="312" height="128" rx="64" 
        stroke="#00FF9B" stroke-width="16" fill="none"/>
  
  <!-- Knob ON -->
  <circle cx="348" cy="256" r="48" fill="#00FF9B"/>
  
  <!-- Spark lines (shorter, tighter) -->
  <line x1="404" y1="224" x2="420" y2="208" stroke="#00FF9B" stroke-width="7" stroke-linecap="round" opacity="0.45"/>
  <line x1="408" y1="256" x2="428" y2="256" stroke="#00FF9B" stroke-width="7" stroke-linecap="round" opacity="0.45"/>
  <line x1="404" y1="288" x2="420" y2="304" stroke="#00FF9B" stroke-width="7" stroke-linecap="round" opacity="0.45"/>
</svg>
