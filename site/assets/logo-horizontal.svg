  <circle cx="144" cy="84" r="24" fill="#00FF9B"/>
  <line x1="172" y1="68" x2="180" y2="60" stroke="#00FF9B" stroke-width="4" stroke-linecap="round" opacity="0.45"/>
  <line x1="174" y1="84" x2="184" y2="84" stroke="#00FF9B" stroke-width="4" stroke-linecap="round" opacity="0.45"/>
  <line x1="172" y1="100" x2="180" y2="108" stroke="#00FF9B" stroke-width="4" stroke-linecap="round" opacity="0.45"/>
  
  <!-- CLICKS -->
