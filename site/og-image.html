<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1200px;
  height: 630px;
  background: #0F0814;
  font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
  color: #FFFFFF;
  overflow: hidden;
  position: relative;
}

/* Subtle grid pattern */
.grid-bg {
  position: absolute;
  inset: 0;
  background-image: 
    linear-gradient(rgba(0,255,155,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,155,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
}

/* Glow effects */
.glow-1 {
  position: absolute;
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(0,255,155,0.08) 0%, transparent 70%);
  top: -100px; right: -50px;
}
.glow-2 {
  position: absolute;
  width: 300px; height: 300px;
  background: radial-gradient(circle, rgba(47,12,72,0.6) 0%, transparent 70%);
  bottom: -50px; left: 100px;
}

.content {
  position: relative;
  z-index: 2;
  display: flex;
  flex-direction: column;
  justify-content: center;
  height: 100%;
  padding: 60px 80px;
}

/* Logo mark inline */
.logo-row {
  display: flex;
  align-items: center;
  gap: 20px;
  margin-bottom: 32px;
}

.logo-mark {
  display: flex;
  align-items: flex-end;
  gap: 6px;
  padding: 12px;
  background: rgba(47,12,72,0.4);
  border-radius: 16px;
  border: 1px solid rgba(0,255,155,0.15);
}
.bar {
  width: 14px;
  border-radius: 4px;
  background: linear-gradient(180deg, #00FF9B 0%, #00CC7D 100%);
}
.bar-1 { height: 24px; opacity: 0.6; }
.bar-2 { height: 40px; opacity: 0.8; }
.bar-3 { height: 60px; }

.logo-text {
  font-size: 36px;
  font-weight: 700;
  letter-spacing: 4px;
}
.logo-text span {
  color: #00FF9B;
  font-size: 16px;
  font-weight: 400;
  letter-spacing: 6px;
  display: block;
  margin-top: -2px;
}

h1 {
  font-size: 48px;
  font-weight: 700;
  line-height: 1.15;
  max-width: 800px;
  margin-bottom: 20px;
}
h1 em {
  color: #00FF9B;
  font-style: normal;
}

.subtitle {
  font-size: 22px;
  color: #C4BFD0;
  max-width: 700px;
  line-height: 1.5;
}

.badges {
  display: flex;
  gap: 16px;
  margin-top: 36px;
}
.badge {
  padding: 8px 20px;
  border-radius: 100px;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 1px;
}
.badge-green {
  background: rgba(0,255,155,0.12);
  border: 1px solid rgba(0,255,155,0.3);
  color: #00FF9B;
}
.badge-purple {
  background: rgba(47,12,72,0.5);
  border: 1px solid rgba(0,255,155,0.15);
  color: #C4BFD0;
}

/* Bottom bar */
.bottom {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: linear-gradient(90deg, transparent, #00FF9B, transparent);
}
</style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="glow-1"></div>
  <div class="glow-2"></div>
  
  <div class="content">
    <div class="logo-row">
      <div class="logo-mark">
        <div class="bar bar-1"></div>
        <div class="bar bar-2"></div>
        <div class="bar bar-3"></div>
      </div>
      <div class="logo-text">
        CLICKS
        <span>PROTOCOL</span>
      </div>
    </div>
    
    <h1>Autonomous <em>Yield</em> for AI Agents</h1>
    <p class="subtitle">Your agent holds USDC. Make it earn 4-10% APY while it sits idle. One SDK call. No lockup.</p>
    
    <div class="badges">
      <div class="badge badge-green">BUILT ON BASE</div>
      <div class="badge badge-purple">OPEN SOURCE</div>
      <div class="badge badge-purple">ZERO LOCKUP</div>
    </div>
  </div>
  
  <div class="bottom"></div>
</body>
</html>
