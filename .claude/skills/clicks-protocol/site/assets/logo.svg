<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00FF9B" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00CC7D" stop-opacity="0.7"/>
    </linearGradient>
    <filter id="neon" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="#0F0814"/>
  <circle cx="256" cy="256" r="240" fill="none" stroke="#2F0C48" stroke-width="2"/>
  
  <!-- Abstract yield/growth mark: ascending bars -->
  <g filter="url(#neon)" transform="translate(256,240)">
    <rect x="-80" y="20" width="36" height="60" rx="6" fill="url(#glow)" opacity="0.6"/>
    <rect x="-28" y="-20" width="36" height="100" rx="6" fill="url(#glow)" opacity="0.8"/>
    <rect x="24" y="-70" width="36" height="150" rx="6" fill="url(#glow)"/>
    
    <!-- Flow connector -->
    <path d="M-62 16 Q-40 -40 -10 -24 Q20 -8 42 -74" 
          stroke="#00FF9B" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.5"/>
    <circle cx="42" cy="-74" r="5" fill="#00FF9B"/>
  </g>
  
  <!-- CLICKS text -->
  <text x="256" y="345" text-anchor="middle" 
        font-family="Inter,SF Pro Display,Segoe UI,sans-serif" 
        font-size="52" font-weight="700" letter-spacing="8" fill="#FFFFFF">
    CLICKS
  </text>
  
  <!-- PROTOCOL subtitle -->
  <text x="256" y="380" text-anchor="middle" 
        font-family="Inter,SF Pro Display,Segoe UI,sans-serif" 
        font-size="18" font-weight="400" letter-spacing="12" fill="#00FF9B" opacity="0.8">
    PROTOCOL
  </text>
</svg>
