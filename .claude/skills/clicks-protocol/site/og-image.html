<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1200px;
  height: 630px;
  background: #0A0A0B;
  font-family: 'Inter', sans-serif;
  overflow: hidden;
  position: relative;
}

/* Grid pattern */
body::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background-image: 
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 60px 60px;
  z-index: 0;
}

/* Purple glow top-right */
.glow-1 {
  position: absolute;
  top: -100px; right: -100px;
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(47,12,72,0.6) 0%, transparent 70%);
  z-index: 1;
}

/* Green glow bottom-left */
.glow-2 {
  position: absolute;
  bottom: -150px; left: -50px;
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(0,255,155,0.08) 0%, transparent 70%);
  z-index: 1;
}

.content {
  position: relative;
  z-index: 2;
  padding: 80px 80px;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.top {
  display: flex;
  align-items: center;
  gap: 24px;
}

.logo-icon {
  width: 64px;
  height: 64px;
}

.logo-text {
  display: flex;
  align-items: baseline;
  gap: 12px;
}

.logo-text .clicks {
  font-size: 32px;
  font-weight: 700;
  letter-spacing: 6px;
  color: #00FF9B;
}

.logo-text .protocol {
  font-size: 32px;
  font-weight: 400;
  letter-spacing: 3px;
  color: #00FF9B;
  opacity: 0.5;
}

.middle {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 24px;
}

h1 {
  font-size: 56px;
  font-weight: 800;
  color: #FFFFFF;
  line-height: 1.15;
  max-width: 800px;
}

h1 span {
  color: #00FF9B;
}

.tagline {
  font-size: 22px;
  color: rgba(255,255,255,0.5);
  font-weight: 400;
  letter-spacing: 0.5px;
}

.bottom {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.stats {
  display: flex;
  gap: 48px;
}

.stat {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.stat-value {
  font-size: 24px;
  font-weight: 700;
  color: #00FF9B;
}

.stat-label {
  font-size: 13px;
  color: rgba(255,255,255,0.35);
  text-transform: uppercase;
  letter-spacing: 2px;
}

.chain-badge {
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 20px;
  padding: 8px 20px;
}

.chain-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #0052FF;
}

.chain-text {
  font-size: 14px;
  color: rgba(255,255,255,0.5);
  font-weight: 500;
}
</style>
</head>
<body>
  <div class="glow-1"></div>
  <div class="glow-2"></div>
  <div class="content">
    <div class="top">
      <svg class="logo-icon" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="100" y="192" width="312" height="128" rx="64" stroke="#00FF9B" stroke-width="16" fill="none"/>
        <circle cx="348" cy="256" r="48" fill="#00FF9B"/>
        <line x1="404" y1="224" x2="420" y2="208" stroke="#00FF9B" stroke-width="7" stroke-linecap="round" opacity="0.45"/>
        <line x1="408" y1="256" x2="428" y2="256" stroke="#00FF9B" stroke-width="7" stroke-linecap="round" opacity="0.45"/>
        <line x1="404" y1="288" x2="420" y2="304" stroke="#00FF9B" stroke-width="7" stroke-linecap="round" opacity="0.45"/>
      </svg>
      <div class="logo-text">
        <span class="clicks">CLICKS</span>
        <span class="protocol">PROTOCOL</span>
      </div>
    </div>
    
    <div class="middle">
      <h1>Autonomous <span>Yield</span> for AI Agents</h1>
      <div class="tagline">One SDK call. No lockup. Fully autonomous.</div>
    </div>
    
    <div class="bottom">
      <div class="stats">
        <div class="stat">
          <div class="stat-value">4-8% APY</div>
          <div class="stat-label">Yield</div>
        </div>
        <div class="stat">
          <div class="stat-value">80/20</div>
          <div class="stat-label">Split</div>
        </div>
        <div class="stat">
          <div class="stat-value">2%</div>
          <div class="stat-label">Protocol Fee</div>
        </div>
      </div>
      <div class="chain-badge">
        <div class="chain-dot"></div>
        <span class="chain-text">Built on Base</span>
      </div>
    </div>
  </div>
</body>
</html>
