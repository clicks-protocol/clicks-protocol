<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Variant 4: The Quantum Node -->
  <!-- Octagon with 4 axis nodes + rotated center square -->
  
  <!-- Octagon -->
  <polygon points="256,68 390,120 444,256 390,392 256,444 122,392 68,256 122,120" 
           stroke="#00FF9B" stroke-width="8" fill="none" stroke-linejoin="round"/>
  
  <!-- Connection lines (nodes to center, with gap near center) -->
  <line x1="256" y1="68" x2="256" y2="224" stroke="#00FF9B" stroke-width="4" opacity="0.4"/>
  <line x1="444" y1="256" x2="288" y2="256" stroke="#00FF9B" stroke-width="4" opacity="0.4"/>
  <line x1="256" y1="444" x2="256" y2="288" stroke="#00FF9B" stroke-width="4" opacity="0.4"/>
  <line x1="68" y1="256" x2="224" y2="256" stroke="#00FF9B" stroke-width="4" opacity="0.4"/>
  
  <!-- North node -->
  <circle cx="256" cy="68" r="16" fill="#00FF9B"/>
  <!-- East node -->
  <circle cx="444" cy="256" r="16" fill="#00FF9B"/>
  <!-- South node -->
  <circle cx="256" cy="444" r="16" fill="#00FF9B"/>
  <!-- West node -->
  <circle cx="68" cy="256" r="16" fill="#00FF9B"/>
  
  <!-- Center: rotated square (45°) -->
  <rect x="232" y="232" width="48" height="48" rx="4"
        transform="rotate(45 256 256)" 
        stroke="#00FF9B" stroke-width="8" fill="none"/>
</svg>
