<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clicks Protocol — Internal Dashboard</title>
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --border: #222;
    --text: #e0e0e0;
    --text-dim: #888;
    --accent: #3b82f6;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #eab308;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 24px;
    max-width: 1200px;
    margin: 0 auto;
  }
  h1 {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .subtitle {
    color: var(--text-dim);
    font-size: 13px;
    margin-bottom: 24px;
  }
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
    margin-bottom: 32px;
  }
  .kpi {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
  }
  .kpi-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    margin-bottom: 6px;
  }
  .kpi-value {
    font-size: 24px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .kpi-sub {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 4px;
  }
  .section {
    margin-bottom: 32px;
  }
  .section-title {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 12px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    font-size: 13px;
  }
  th {
    text-align: left;
    padding: 10px 12px;
    background: #1a1a1a;
    color: var(--text-dim);
    font-weight: 500;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  td {
    padding: 8px 12px;
    border-top: 1px solid var(--border);
    font-variant-numeric: tabular-nums;
  }
  .mono {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 12px;
  }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 500;
  }
  .badge-read { background: #1e3a5f; color: #60a5fa; }
  .badge-write { background: #3b1f1f; color: #f87171; }
  .badge-event { background: #1a3320; color: #4ade80; }
  .status-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 6px;
  }
  .status-live { background: var(--green); }
  .status-off { background: var(--red); }
  .refresh-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    float: right;
  }
  .refresh-btn:hover { border-color: var(--accent); }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 24px;
  }
  .truncate {
    max-width: 200px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    display: inline-block;
  }
  #loading {
    color: var(--text-dim);
    text-align: center;
    padding: 40px;
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1><span class="status-dot status-live"></span>Clicks Protocol</h1>
    <div class="subtitle">Internal Dashboard — <span id="last-update">loading...</span></div>
  </div>
  <button class="refresh-btn" onclick="loadAll()">Refresh</button>
</div>

<div id="loading">Loading data...</div>

<div id="content" style="display:none">

  <!-- KPIs -->
  <div class="kpi-grid" id="kpi-grid"></div>

  <!-- Recent Events -->
  <div class="section">
    <div class="section-title">Recent Chain Events</div>
    <table>
      <thead><tr><th>Event</th><th>Agent</th><th>Amount</th><th>Block</th><th>Tx</th></tr></thead>
      <tbody id="events-body"></tbody>
    </table>
  </div>

  <!-- Payments -->
  <div class="section">
    <div class="section-title">Payment History</div>
    <table>
      <thead><tr><th>Agent</th><th>Total</th><th>Liquid</th><th>To Yield</th><th>Block</th><th>Tx</th></tr></thead>
      <tbody id="payments-body"></tbody>
    </table>
  </div>

  <!-- MCP Usage -->
  <div class="section">
    <div class="section-title">MCP Tool Usage</div>
    <table>
      <thead><tr><th>Tool</th><th>Direction</th><th>Calls</th><th>Errors</th><th>Bucket</th></tr></thead>
      <tbody id="mcp-body"></tbody>
    </table>
  </div>

  <!-- Protocol Snapshots -->
  <div class="section">
    <div class="section-title">Protocol State History</div>
    <table>
      <thead><tr><th>Time</th><th>Agents</th><th>TVL (USDC)</th><th>Protocol</th><th>Aave APY</th><th>Morpho APY</th><th>Fees</th><th>Block</th></tr></thead>
      <tbody id="snapshots-body"></tbody>
    </table>
  </div>

</div>

<script>
const API = '';

function usdc(raw) {
  return (Number(raw) / 1e6).toFixed(2);
}

function bpsToPercent(bps) {
  return (Number(bps) / 100).toFixed(2) + '%';
}

function shortTx(hash) {
  if (!hash) return '-';
  return hash.slice(0, 10) + '...' + hash.slice(-6);
}

function shortAddr(addr) {
  if (!addr) return '-';
  return addr.slice(0, 8) + '...' + addr.slice(-4);
}

function timeAgo(isoStr) {
  if (!isoStr) return '-';
  const diff = Date.now() - new Date(isoStr).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  return Math.floor(hrs / 24) + 'd ago';
}

async function fetchJson(endpoint) {
  const res = await fetch(API + endpoint);
  return res.json();
}

function renderKpis(data) {
  const grid = document.getElementById('kpi-grid');
  const kpis = [
    { label: 'Total Agents', value: data.totalAgents, sub: '' },
    { label: 'TVL', value: data.tvlUsdc.toFixed(2) + ' USDC', sub: '' },
    { label: 'Payments', value: data.totalPayments, sub: data.totalPaymentVolumeUsdc.toFixed(2) + ' USDC volume' },
    { label: 'Active Protocol', value: data.activeProtocol, sub: '' },
    { label: 'Aave APY', value: data.aaveApyPct.toFixed(2) + '%', sub: '' },
    { label: 'Morpho APY', value: data.morphoApyPct.toFixed(2) + '%', sub: '' },
    { label: 'Fees Collected', value: data.totalFeesCollectedUsdc.toFixed(2) + ' USDC', sub: data.pendingFeesUsdc.toFixed(2) + ' pending' },
    { label: 'MCP Calls', value: data.totalMcpCalls, sub: '' },
    { label: 'Chain Events', value: data.totalChainEvents, sub: '' },
    { label: 'Last Snapshot', value: timeAgo(data.lastSnapshotAt), sub: data.lastBlockNumber ? 'Block ' + data.lastBlockNumber.toLocaleString() : '' },
  ];

  grid.innerHTML = kpis.map(k => `
    <div class="kpi">
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-value">${k.value}</div>
      ${k.sub ? '<div class="kpi-sub">' + k.sub + '</div>' : ''}
    </div>
  `).join('');
}

function renderEvents(events) {
  const body = document.getElementById('events-body');
  if (!events.length) {
    body.innerHTML = '<tr><td colspan="5" style="color:var(--text-dim)">No events yet</td></tr>';
    return;
  }
  body.innerHTML = events.map(e => `
    <tr>
      <td><span class="badge badge-event">${e.event_name}</span></td>
      <td class="mono truncate" title="${e.agent_address || ''}">${shortAddr(e.agent_address)}</td>
      <td>${e.amount_total_usdc ? usdc(e.amount_total_usdc) + ' USDC' : '-'}</td>
      <td class="mono">${Number(e.block_number).toLocaleString()}</td>
      <td class="mono"><a href="https://basescan.org/tx/${e.tx_hash}" target="_blank" style="color:var(--accent)">${shortTx(e.tx_hash)}</a></td>
    </tr>
  `).join('');
}

function renderPayments(payments) {
  const body = document.getElementById('payments-body');
  if (!payments.length) {
    body.innerHTML = '<tr><td colspan="6" style="color:var(--text-dim)">No payments yet</td></tr>';
    return;
  }
  body.innerHTML = payments.map(p => `
    <tr>
      <td class="mono truncate" title="${p.agent_address}">${shortAddr(p.agent_address)}</td>
      <td>${usdc(p.amount_total_usdc)}</td>
      <td>${usdc(p.amount_liquid_usdc)}</td>
      <td>${usdc(p.amount_to_yield_usdc)}</td>
      <td class="mono">${Number(p.block_number).toLocaleString()}</td>
      <td class="mono"><a href="https://basescan.org/tx/${p.tx_hash}" target="_blank" style="color:var(--accent)">${shortTx(p.tx_hash)}</a></td>
    </tr>
  `).join('');
}

function renderMcpUsage(rows) {
  const body = document.getElementById('mcp-body');
  if (!rows.length) {
    body.innerHTML = '<tr><td colspan="5" style="color:var(--text-dim)">No MCP usage recorded</td></tr>';
    return;
  }
  body.innerHTML = rows.map(r => `
    <tr>
      <td class="mono">${r.tool_name}</td>
      <td><span class="badge ${r.direction === 'read' ? 'badge-read' : 'badge-write'}">${r.direction}</span></td>
      <td>${r.call_count}</td>
      <td>${r.error_count > 0 ? '<span style="color:var(--red)">' + r.error_count + '</span>' : '0'}</td>
      <td class="mono" style="font-size:11px">${r.bucket_start}</td>
    </tr>
  `).join('');
}

function renderSnapshots(snapshots) {
  const body = document.getElementById('snapshots-body');
  if (!snapshots.length) {
    body.innerHTML = '<tr><td colspan="8" style="color:var(--text-dim)">No snapshots yet</td></tr>';
    return;
  }
  body.innerHTML = snapshots.map(s => `
    <tr>
      <td style="font-size:12px">${timeAgo(s.captured_at)}</td>
      <td>${s.total_agents}</td>
      <td>${usdc(s.tvl_usdc)}</td>
      <td>${s.active_protocol}</td>
      <td>${bpsToPercent(s.aave_apy_bps)}</td>
      <td>${bpsToPercent(s.morpho_apy_bps)}</td>
      <td>${usdc(s.pending_fees_usdc)}</td>
      <td class="mono">${Number(s.block_number).toLocaleString()}</td>
    </tr>
  `).join('');
}

async function loadAll() {
  try {
    const [overview, events, payments, mcpUsage, snapshots] = await Promise.all([
      fetchJson('/api/overview'),
      fetchJson('/api/events'),
      fetchJson('/api/payments'),
      fetchJson('/api/mcp-usage'),
      fetchJson('/api/snapshots'),
    ]);

    renderKpis(overview);
    renderEvents(events);
    renderPayments(payments);
    renderMcpUsage(mcpUsage);
    renderSnapshots(snapshots);

    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';
    document.getElementById('last-update').textContent = new Date().toLocaleTimeString();
  } catch (err) {
    document.getElementById('loading').textContent = 'Error: ' + err.message;
  }
}

loadAll();
setInterval(loadAll, 30000);
</script>
</body>
</html>
